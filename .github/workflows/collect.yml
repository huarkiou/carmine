name: Collect Car Data

on:
  workflow_dispatch:

jobs:
  fetch-sales:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: |
          mkdir -p output
          CARMINE_OUTPUT="$PWD/output" uv run python -m src.fetch_sales
      - uses: actions/upload-artifact@v4
        with:
          name: sales
          path: output/

  fetch-specs:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        mode: [sales, 跑车, 皮卡]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: |
          CARMINE_OUTPUT="$PWD/output" CARMINE_MODE="${{ matrix.mode }}" uv run python -m src.fetch_specs
      - uses: actions/upload-artifact@v4
        with:
          name: specs-${{ matrix.mode }}
          path: output/

  package:
    needs: [fetch-sales, fetch-specs]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true
      - run: |
          ls -R output/
          zip -r carmine-data.zip output/
      - uses: actions/upload-artifact@v4
        with:
          name: carmine-data
          path: carmine-data.zip
